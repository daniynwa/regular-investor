<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="128" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Circle border -->
  <circle cx="64" cy="64" r="60" stroke="url(#circleGrad)" stroke-width="6" fill="#0b1120"/>
  <!-- Bar chart -->
  <rect x="30" y="76" width="14" height="26" rx="3" fill="#dc2626"/>
  <rect x="50" y="60" width="14" height="42" rx="3" fill="#dc2626"/>
  <rect x="70" y="44" width="14" height="58" rx="3" fill="#dc2626"/>
  <!-- Growth arrow curve -->
  <path d="M26 90 Q64 20 106 30" stroke="url(#arrowGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Arrow tip -->
