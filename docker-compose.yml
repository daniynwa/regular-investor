services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-regular_investor}
      MYSQL_USER: ${DB_USER:-ri_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-your_strong_password_here}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "4321:4321"
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ri_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_strong_password_here}
      DB_NAME: ${DB_NAME:-regular_investor}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_SECRET: ${ADMIN_SECRET:-change_this_secret_to_32chars!!}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
